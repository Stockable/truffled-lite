<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="png/logo.png" />
    <title>Truffled - Math</title>
    
    <link rel="stylesheet" href="css/style.css">
    <style id="dynamic-style"></style>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <style>
        /* SITE UI STYLES */
        #ui-header {
            position: relative;
            max-width: 600px;
            margin: 0 auto;
            text-align: center;
        }

        #game-view {
            width: 100%;
            max-width: 1000px;
            margin: 20px auto;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            background: #1a2525;
        }

        #game-wrapper {
            width: 100%;
            height: 700px;
            background: #fbf8ef;
            border: none;
            display: block;
        }

        #game-wrapper:fullscreen {
            width: 100vw;
            height: 100vh;
        }

      

     

        .navbar-right svg, .navbar-right img {
            width: 32px; /* Increased from 24px */
            height: 32px; /* Increased from 24px */
            fill: currentColor;
        }



        .settings-section h2 { margin-top: 0; font-size: 1.2rem; text-transform: uppercase; }
        .settings-section p { opacity: 0.8; font-size: 0.9rem; }
        
        button, select, input[type="url"] {
            background: #2a3a3a;
            color: white;
            border: 1px solid #444;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
            font-family: inherit;
        }

        /* SEARCH & RECOMMENDATIONS */
        .search-container {
            position: relative;
            width: 100%;
        }

        #searchResults {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #1a2525;
            border: 1px solid rgba(255,255,255,0.1);
            border-top: none;
            border-radius: 0 0 12px 12px;
            max-height: 300px;
            overflow-y: auto;
            z-index: 1000;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        .search-item {
            display: flex;
            align-items: center;
            padding: 10px 15px;
            cursor: pointer;
            transition: background 0.2s;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            text-align: left;
            color: white;
            font-family: 'Poppins', sans-serif;
        }

        .search-item:hover { background: rgba(255,255,255,0.1); }
        .search-item img { width: 40px; height: 40px; border-radius: 6px; margin-right: 15px; object-fit: cover; }

        #game-controls.iframeiconshere {
            display: flex;
            justify-content: flex-start;
            gap: 12px;
            padding: 12px 20px;
            background: #1a2525;
        }

        #game-controls.iframeiconshere a {
            color: #fff;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            transition: 0.2s;
        }

        #game-controls.iframeiconshere a:hover { background: rgba(255, 255, 255, 0.2); transform: translateY(-2px); }
        #game-controls.iframeiconshere svg { width: 20px; height: 20px; }

        #searchCount {
            color: #ffffff;
            text-align: center;
            font-family: 'Poppins', sans-serif !important;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .game-gallery {
            display: grid;
            grid-template-columns: repeat(6, 1fr); 
            gap: 25px;
            padding: 20px;
        }

        .game {
            position: relative;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-radius: 10px;
            background: #1a2525;
        }

        .game:hover { transform: translateY(-5px); box-shadow: 0 15px 35px rgba(0,0,0,0.6); }

        .game-link {
            position: relative;
            display: block;
            width: 100%;
            aspect-ratio: 1 / 1;
            border-radius: 10px;
            overflow: hidden;
        }

        .game-link::after {
            content: attr(data-title);
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', sans-serif !important;
            font-weight: 600;
            font-size: 1rem;
            opacity: 0;
            transition: opacity 0.3s ease;
            text-align: center;
            padding: 10px;
            box-sizing: border-box;
            z-index: 2;
        }

        .game:hover .game-link::after { opacity: 1; }
        .game-thumbnail { width: 100%; height: 100%; object-fit: cover; display: block; }

        .hidden { display: none !important; }

        @media (max-width: 1000px) {
            .game-gallery { grid-template-columns: repeat(3, 1fr); }
            .navbar-right { bottom: 20px; top: auto; right: 50%; transform: translateX(50%); flex-direction: row; }
        }
    </style>
</head>

<body>
    <div class="navbar-right">
        <a href="https://discord.gg/vVqY36mzvj" target="_blank" title="Discord">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 512">
                <path d="M524.5 69.8a1.5 1.5 0 0 0 -.8-.7A485.1 485.1 0 0 0 404.1 32a1.8 1.8 0 0 0 -1.9 .9 337.5 337.5 0 0 0 -14.9 30.6 447.8 447.8 0 0 0 -134.4 0 309.5 309.5 0 0 0 -15.1-30.6 1.9 1.9 0 0 0 -1.9-.9A483.7 483.7 0 0 0 116.1 69.1a1.7 1.7 0 0 0 -.8 .7C39.1 183.7 18.2 294.7 28.4 404.4a2 2 0 0 0 .8 1.4A487.7 487.7 0 0 0 176 479.9a1.9 1.9 0 0 0 2.1-.7A348.2 348.2 0 0 0 208.1 430.4a1.9 1.9 0 0 0 -1-2.6 321.2 321.2 0 0 1 -45.9-21.9 1.9 1.9 0 0 1 -.2-3.1c3.1-2.3 6.2-4.7 9.1-7.1a1.8 1.8 0 0 1 1.9-.3c96.2 43.9 200.4 43.9 295.5 0a1.8 1.8 0 0 1 1.9 .2c2.9 2.4 6 4.9 9.1 7.2a1.9 1.9 0 0 1 -.2 3.1 301.4 301.4 0 0 1 -45.9 21.8 1.9 1.9 0 0 0 -1 2.6 391.1 391.1 0 0 0 30 48.8 1.9 1.9 0 0 0 2.1 .7A486 486 0 0 0 610.7 405.7a1.9 1.9 0 0 0 .8-1.4C623.7 277.6 590.9 167.5 524.5 69.8zM222.5 337.6c-29 0-52.8-26.6-52.8-59.2S193.1 219.1 222.5 219.1c29.7 0 53.3 26.8 52.8 59.2C275.3 311 251.9 337.6 222.5 337.6zm195.4 0c-29 0-52.8-26.6-52.8-59.2S388.4 219.1 417.9 219.1c29.7 0 53.3 26.8 52.8 59.2C470.7 311 447.5 337.6 417.9 337.6z"/>
            </svg>
        </a>

            
    </div>

    <div class="content" id="main-content">
        <div id="ui-header">
            <h4>Truffled Lite</h4>
            <div id="searchCount">Scanning games...</div>
            <div class="search-container">
                <input type="text" id="searchInput" class="search-bar" placeholder="Search games..." autocomplete="off">
                <div id="searchResults" class="hidden"></div>
            </div>
        </div>
        
        <div class="container" id="gallery-container">
            <div class="game-gallery" id="gameGallery"></div>
        </div>

        <div id="settings-view" class="settings-container hidden">
            <section id="cloaksettings" class="settings-section">
                <h2>tab cloak</h2>
                <p>disguise the tab title and icon</p>
                <select id="cloakSelect"> <option value="">none (default)</option> </select>
                <button id="cloakReset">reset cloak</button>
            </section>
            <section id="adsettings" class="settings-section">
                <h2>ads</h2>
                <div class="toggle-switch">
                    <label for="adsToggle">disable ads:</label>
                    <input type="checkbox" id="adsToggle">
                </div>
                <p id="adsStatus"></p>
            </section>
            <section id="aboutblanksettings" class="settings-section">
                <h2>about:blank</h2>
                <p>open site in a blank tab to hide from history</p>
                <button onclick="openInAboutBlank()">open in about:blank</button>
            </section>
            <section id="panickeysettings" class="settings-section">
                <h2>panic key</h2>
                <button onclick="changePanicKey()">change panic key</button>
                <input type="url" id="panicUrlInput" placeholder="https://www.google.com">
                <button onclick="savePanicUrl()">set url</button>
            </section>
            <section id="datamanager" class="settings-section">
                <h2>data saving</h2>
                <button onclick="exportData('save')">export data</button>
                <button onclick="importData()">import data</button>
            </section>
        </div>

        <div id="game-view" class="hidden">
            <iframe id="game-wrapper" title="Game Content" allowfullscreen></iframe>
            <div id="game-controls" class="iframeiconshere">
                <a href="javascript:void(0)" id="fullscreen-btn" title="Fullscreen">
                    <svg viewBox="0 0 448 512" fill="currentColor"><path d="M32 32C14.3 32 0 46.3 0 64v96c0 17.7 14.3 32 32 32s32-14.3 32-32V96h64c17.7 0 32-14.3 32-32s-14.3-32-32-32H32zM64 352c0-17.7-14.3-32-32-32s-32 14.3-32 32v96c0 17.7 14.3 32 32 32h96c17.7 0 32-14.3 32-32s-14.3-32-32-32H64V352zM320 32c-17.7 0-32 14.3-32 32s14.3 32 32 32h64v64c0 17.7 14.3 32 32 32s32-14.3 32-32V64c0-17.7-14.3-32-32-32H320zM448 352c0-17.7-14.3-32-32-32s-32 14.3-32 32v64h-64c-17.7 0-32 14.3-32 32s14.3 32 32 32h96c17.7 0 32-14.3 32-32V352z"/></svg>
                </a>
                <a href="javascript:void(0)" onclick="loadGameFromUrl(window.currentUrl)" title="Reload">
                    <svg viewBox="0 0 512 512" fill="currentColor"><path d="M463.5 224H472c13.3 0 24-10.7 24-24V72c0-9.7-5.8-18.5-14.8-22.2s-19.3-1.7-26.2 5.2L413.4 96.6c-87.6-86.5-228.7-86.2-315.8 1c-87.5 87.5-87.5 229.3 0 316.8s229.3 87.5 316.8 0c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0c-62.5 62.5-163.8 62.5-226.3 0s-62.5-163.8 0-226.3c62.2-62.2 162.7-62.5 225.3-1L327 183c-6.9 6.9-8.9 17.2-5.2 26.2s12.5 14.8 22.2 14.8H463.5z"/></svg>
                </a>
                <a href="javascript:void(0)" onclick="showGallery()" title="Back to Gallery">
                    <svg viewBox="0 0 512 512" fill="currentColor"><path d="M9.4 233.4c-12.5 12.5-12.5 32.8 0 45.3l160 160c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3L109.2 288H480c17.7 0 32-14.3 32-32s-14.3-32-32-32H109.2l105.4-105.4c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0l-160 160z"/></svg>
                </a>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://api.github.com/repos/Stockable/truffled-lite/contents/games";
        const RAW_BASE = "https://raw.githubusercontent.com/Stockable/truffled-lite/main/games/";
        const IMG_BASE = "https://raw.githubusercontent.com/Stockable/truffled-lite/main/png/";

        // VIEW SWITCHING
        function showGallery() {
            document.getElementById('gallery-container').classList.remove('hidden');
            document.getElementById('ui-header').classList.remove('hidden');
            document.getElementById('game-view').classList.add('hidden');
            document.getElementById('settings-view').classList.add('hidden');
            document.getElementById('game-wrapper').srcdoc = "";
        }

        function showSettings() {
            document.getElementById('gallery-container').classList.add('hidden');
            document.getElementById('ui-header').classList.add('hidden');
            document.getElementById('game-view').classList.add('hidden');
            document.getElementById('settings-view').classList.remove('hidden');
        }

        // ABOUT BLANK
        function openInAboutBlank() {
            const win = window.open('about:blank', '_blank');
            if (win) {
                const url = window.location.href;
                win.document.write(`
                    <!DOCTYPE html>
                    <html>
                    <head>
                        <title>Google</title>
                        <link rel="icon" type="image/x-icon" href="https://www.google.com/favicon.ico">
                        <style>
                            body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; }
                            iframe { width: 100%; height: 100%; border: none; }
                        </style>
                    </head>
                    <body>
                        <iframe src="${url}"></iframe>
                    </body>
                    </html>
                `);
                win.document.close();
            } else {
                alert("Popup blocked! Please allow popups for this site.");
            }
        }

        async function getRemoteContent(url) {
            const r = await fetch(url);
            return r.ok ? await r.text() : null;
        }

        (async () => {
            const css = await getRemoteContent('https://raw.githubusercontent.com/Stockable/truffled-lite/refs/heads/main/truffled/style.css');
            if (css) document.getElementById('dynamic-style').textContent = css;
        })();

        async function loadGameFromUrl(url) {
            window.currentUrl = url;
            const iframe = document.getElementById('game-wrapper');
            const gameView = document.getElementById('game-view');
            const html = await getRemoteContent(url);
            if (html) {
                document.getElementById('gallery-container').classList.add('hidden');
                document.getElementById('ui-header').classList.add('hidden');
                document.getElementById('settings-view').classList.add('hidden');
                document.getElementById('searchResults').classList.add('hidden');
                gameView.classList.remove('hidden');
                iframe.srcdoc = html;
            }
        }

        document.getElementById('fullscreen-btn').onclick = () => {
            const iframe = document.getElementById('game-wrapper');
            if (iframe.requestFullscreen) iframe.requestFullscreen();
        };

        class SmartLoader {
            async init() {
                try {
                    const response = await fetch(API_URL);
                    const files = await response.json();
                    const games = files
                        .filter(f => f.name.endsWith('.html'))
                        .map(f => {
                            const id = f.name.replace('.html', '');
                            return { name: id, url: RAW_BASE + f.name, thumbnail: `${IMG_BASE}${id}.png` };
                        })
                        .sort((a, b) => a.name.localeCompare(b.name, undefined, {numeric: true}));
                    this.render(games);
                    this.setupSearch(games);
                } catch (e) {
                    document.getElementById('searchCount').textContent = "Error loading games.";
                }
            }

            render(games) {
                const gallery = document.getElementById('gameGallery');
                gallery.innerHTML = '';
                games.forEach(g => {
                    const div = document.createElement('div');
                    div.className = 'game';
                    div.setAttribute('data-name', g.name);
                    div.innerHTML = `<a href="javascript:void(0)" onclick="loadGameFromUrl('${g.url}')" class="game-link" data-title="${g.name}">
                        <img src="${g.thumbnail}" class="game-thumbnail" onerror="this.src='https://placehold.co/200?text=${g.name}'"></a>`;
                    gallery.appendChild(div);
                });
                document.getElementById('searchCount').textContent = `Showing all ${games.length} games`;
            }

            setupSearch(games) {
                const input = document.getElementById('searchInput');
                const resultsDropdown = document.getElementById('searchResults');
                input.oninput = () => {
                    const val = input.value.toLowerCase();
                    resultsDropdown.innerHTML = '';
                    if (val.length > 0) {
                        resultsDropdown.classList.remove('hidden');
                        const filtered = games.filter(g => g.name.toLowerCase().includes(val));
                        filtered.forEach(g => {
                            const item = document.createElement('div');
                            item.className = 'search-item';
                            item.innerHTML = `<img src="${g.thumbnail}" onerror="this.src='https://placehold.co/50?text=?'"><span>${g.name}</span>`;
                            item.onclick = () => loadGameFromUrl(g.url);
                            resultsDropdown.appendChild(item);
                        });
                    } else { resultsDropdown.classList.add('hidden'); }
                };
            }
        }

        new SmartLoader().init();
    </script>
</body>
</html>

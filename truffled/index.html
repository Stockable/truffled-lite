<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="png/logo.png" />
    <title>Truffled - Math</title>
    
    <link rel="stylesheet" href="css/style.css">
    <style id="dynamic-style"></style>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <style>
        /* SITE UI STYLES */
        #ui-header {
            position: relative;
            max-width: 600px;
            margin: 0 auto;
            text-align: center;
        }

        #game-view {
            width: 100%;
            max-width: 1000px;
            margin: 20px auto;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            background: #1a2525;
        }

        #game-wrapper {
            width: 100%;
            height: 700px;
            background: #fbf8ef;
            border: none;
            display: block;
        }

        #game-wrapper:fullscreen {
            width: 100vw;
            height: 100vh;
        }

        /* SEARCH & RECOMMENDATIONS */
        .search-container {
            position: relative;
            width: 100%;
        }

        #searchResults {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #1a2525;
            border: 1px solid rgba(255,255,255,0.1);
            border-top: none;
            border-radius: 0 0 12px 12px;
            max-height: 300px;
            overflow-y: auto;
            z-index: 1000;
            box-shadow: 0 10px 20px rgba(0,0,0,0.4);
        }

        .search-item {
            display: flex;
            align-items: center;
            padding: 10px 15px;
            cursor: pointer;
            transition: background 0.2s;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            text-align: left;
            color: white;
            font-family: 'Poppins', sans-serif;
        }

        .search-item:hover {
            background: rgba(255,255,255,0.1);
        }

        .search-item img {
            width: 40px;
            height: 40px;
            border-radius: 6px;
            margin-right: 15px;
            object-fit: cover;
        }

        /* ICONS & GALLERY */
        #game-controls.iframeiconshere {
            display: flex;
            justify-content: flex-start;
            gap: 12px;
            padding: 12px 20px;
            background: #1a2525;
        }

        #game-controls.iframeiconshere a {
            color: #fff;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            transition: 0.2s;
        }

        #game-controls.iframeiconshere a:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        #game-controls.iframeiconshere svg { width: 20px; height: 20px; }

        #searchCount {
            color: #ffffff;
            text-align: center;
            font-family: 'Poppins', sans-serif !important;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .game-gallery {
            display: grid;
            grid-template-columns: repeat(6, 1fr); 
            gap: 25px;
            padding: 20px;
        }

        .game {
            position: relative;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-radius: 10px;
            background: #1a2525;
        }

        .game:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        }

        .game-link {
            position: relative;
            display: block;
            width: 100%;
            aspect-ratio: 1 / 1;
            border-radius: 10px;
            overflow: hidden;
        }

        .game-link::after {
            content: attr(data-title);
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', sans-serif !important;
            font-weight: 600;
            font-size: 1rem;
            opacity: 0;
            transition: opacity 0.3s ease;
            text-align: center;
            padding: 10px;
            box-sizing: border-box;
            z-index: 2;
        }

        .game:hover .game-link::after { opacity: 1; }

        .game-thumbnail { width: 100%; height: 100%; object-fit: cover; display: block; }

        .hidden { display: none !important; }

        @media (max-width: 1000px) {
            .game-gallery { grid-template-columns: repeat(3, 1fr); }
        }
    </style>
</head>

<body>
    <div class="content" id="main-content">
        <div id="ui-header">
            <h4>Truffled Lite</h4>
            <div id="searchCount">Scanning games...</div>
            <div class="search-container">
                <input type="text" id="searchInput" class="search-bar" placeholder="Search games..." autocomplete="off">
                <div id="searchResults" class="hidden"></div>
            </div>
        </div>
        
        <div class="container" id="gallery-container">
            <div class="game-gallery" id="gameGallery"></div>
        </div>

        <div id="game-view" class="hidden">
            <iframe id="game-wrapper" title="Game Content" allowfullscreen></iframe>
            <div id="game-controls" class="iframeiconshere">
                <a href="javascript:void(0)" id="fullscreen-btn" title="Fullscreen">
                    <svg viewBox="0 0 448 512" fill="currentColor"><path d="M32 32C14.3 32 0 46.3 0 64v96c0 17.7 14.3 32 32 32s32-14.3 32-32V96h64c17.7 0 32-14.3 32-32s-14.3-32-32-32H32zM64 352c0-17.7-14.3-32-32-32s-32 14.3-32 32v96c0 17.7 14.3 32 32 32h96c17.7 0 32-14.3 32-32s-14.3-32-32-32H64V352zM320 32c-17.7 0-32 14.3-32 32s14.3 32 32 32h64v64c0 17.7 14.3 32 32 32s32-14.3 32-32V64c0-17.7-14.3-32-32-32H320zM448 352c0-17.7-14.3-32-32-32s-32 14.3-32 32v64h-64c-17.7 0-32 14.3-32 32s14.3 32 32 32h96c17.7 0 32-14.3 32-32V352z"/></svg>
                </a>
                <a href="javascript:void(0)" onclick="loadGameFromUrl(window.currentUrl)" title="Reload">
                    <svg viewBox="0 0 512 512" fill="currentColor"><path d="M463.5 224H472c13.3 0 24-10.7 24-24V72c0-9.7-5.8-18.5-14.8-22.2s-19.3-1.7-26.2 5.2L413.4 96.6c-87.6-86.5-228.7-86.2-315.8 1c-87.5 87.5-87.5 229.3 0 316.8s229.3 87.5 316.8 0c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0c-62.5 62.5-163.8 62.5-226.3 0s-62.5-163.8 0-226.3c62.2-62.2 162.7-62.5 225.3-1L327 183c-6.9 6.9-8.9 17.2-5.2 26.2s12.5 14.8 22.2 14.8H463.5z"/></svg>
                </a>
                <a href="javascript:void(0)" onclick="location.reload()" title="Back to Gallery">
                    <svg viewBox="0 0 512 512" fill="currentColor"><path d="M9.4 233.4c-12.5 12.5-12.5 32.8 0 45.3l160 160c12.5 12.5 32.8 12.5 45.3 0s12.5-32.8 0-45.3L109.2 288H480c17.7 0 32-14.3 32-32s-14.3-32-32-32H109.2l105.4-105.4c12.5-12.5 12.5-32.8 0-45.3s-32.8-12.5-45.3 0l-160 160z"/></svg>
                </a>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://api.github.com/repos/Stockable/truffled-lite/contents/games";
        const RAW_BASE = "https://raw.githubusercontent.com/Stockable/truffled-lite/main/games/";
        const IMG_BASE = "https://raw.githubusercontent.com/Stockable/truffled-lite/main/png/";

        async function getRemoteContent(url) {
            const r = await fetch(url);
            return r.ok ? await r.text() : null;
        }

        (async () => {
            const css = await getRemoteContent('https://raw.githubusercontent.com/Stockable/truffled-lite/refs/heads/main/truffled/style.css');
            if (css) document.getElementById('dynamic-style').textContent = css;
        })();

        async function loadGameFromUrl(url) {
            window.currentUrl = url;
            const iframe = document.getElementById('game-wrapper');
            const gameView = document.getElementById('game-view');
            const html = await getRemoteContent(url);
            if (html) {
                document.getElementById('gallery-container').classList.add('hidden');
                document.getElementById('ui-header').classList.add('hidden');
                document.getElementById('searchResults').classList.add('hidden');
                gameView.classList.remove('hidden');
                iframe.srcdoc = html;
            }
        }

        document.getElementById('fullscreen-btn').onclick = () => {
            const iframe = document.getElementById('game-wrapper');
            if (iframe.requestFullscreen) iframe.requestFullscreen();
            else if (iframe.webkitRequestFullscreen) iframe.webkitRequestFullscreen();
            else if (iframe.msRequestFullscreen) iframe.msRequestFullscreen();
        };

        class SmartLoader {
            async init() {
                try {
                    const response = await fetch(API_URL);
                    const files = await response.json();
                    
                    const games = files
                        .filter(file => file.name.endsWith('.html'))
                        .map(file => {
                            const id = file.name.replace('.html', '');
                            return {
                                name: id,
                                url: RAW_BASE + file.name,
                                thumbnail: `${IMG_BASE}${id}.png`
                            };
                        })
                        .sort((a, b) => a.name.localeCompare(b.name, undefined, {numeric: true, sensitivity: 'base'}));

                    this.render(games);
                    this.setupSearch(games);
                } catch (e) {
                    console.error("Failed to load games", e);
                    document.getElementById('searchCount').textContent = "Error loading games.";
                }
            }

            render(games) {
                const gallery = document.getElementById('gameGallery');
                gallery.innerHTML = '';
                games.forEach(g => {
                    const div = document.createElement('div');
                    div.className = 'game';
                    div.setAttribute('data-name', g.name);
                    div.innerHTML = `
                        <a href="javascript:void(0)" onclick="loadGameFromUrl('${g.url}')" class="game-link" data-title="${g.name}">
                            <img src="${g.thumbnail}" class="game-thumbnail" onerror="this.src='https://placehold.co/200?text=${g.name}'">
                        </a>`;
                    gallery.appendChild(div);
                });
                document.getElementById('searchCount').textContent = `Showing all ${games.length} games`;
            }

            setupSearch(games) {
                const input = document.getElementById('searchInput');
                const countText = document.getElementById('searchCount');
                const resultsDropdown = document.getElementById('searchResults');

                input.oninput = () => {
                    const val = input.value.toLowerCase();
                    let count = 0;
                    resultsDropdown.innerHTML = '';

                    if (val.length > 0) {
                        resultsDropdown.classList.remove('hidden');
                        const filtered = games.filter(g => g.name.toLowerCase().includes(val));
                        
                        filtered.forEach(g => {
                            const item = document.createElement('div');
                            item.className = 'search-item';
                            item.innerHTML = `
                                <img src="${g.thumbnail}" onerror="this.src='https://placehold.co/50?text=?'">
                                <span>${g.name}</span>
                            `;
                            item.onclick = () => loadGameFromUrl(g.url);
                            resultsDropdown.appendChild(item);
                            count++;
                        });

                        if (count === 0) {
                            resultsDropdown.innerHTML = '<div class="search-item">No results found</div>';
                        }
                    } else {
                        resultsDropdown.classList.add('hidden');
                    }

                    // also filter the main gallery grid
                    document.querySelectorAll('.game').forEach(item => {
                        const match = item.getAttribute('data-name').toLowerCase().includes(val);
                        item.style.display = match ? 'block' : 'none';
                    });

                    countText.textContent = val ? `Found ${count} matches in ${games.length} games` : `Showing all ${games.length} games`;
                };

                // close dropdown if clicking outside
                document.addEventListener('click', (e) => {
                    if (!input.contains(e.target) && !resultsDropdown.contains(e.target)) {
                        resultsDropdown.classList.add('hidden');
                    }
                });
            }
        }

        new SmartLoader().init();
    </script>
</body>
</html>
